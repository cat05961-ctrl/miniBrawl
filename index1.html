<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#1e2142,#2c2f5c);
  color:white;
  text-align:center;
}

button{
  border:none;
  padding:15px;
  margin:10px;
  border-radius:12px;
  font-size:16px;
}
</style>
</head>

<body>

<h1>🛒 Магазин</h1>

<p id="info"></p>

<button onclick="upgrade()">⬆️ Уровень</button>
<button onclick="damage()">💥 Урон</button>
<button onclick="heal()">❤️ ХП</button>

<br>
<button onclick="back()">⬅ Назад</button>

<script>
let coins = +localStorage.getItem("coins") || 0;
let level = +localStorage.getItem("level") || 1;
let dmg = +localStorage.getItem("dmg") || 5;
let hp = +localStorage.getItem("hp") || 100;

// цены растут 🔥
function priceLvl(){ return 20 * level }
function priceDmg(){ return 15 * dmg }
function priceHp(){ return 10 * (hp/10) }

function update(){
  document.getElementById("info").innerText =
    `💰 ${coins} | lvl ${level} | dmg ${dmg} | hp ${hp}
⬆️ ${priceLvl()} | 💥 ${priceDmg()} | ❤️ ${priceHp()}`;
}

function upgrade(){
  let p = priceLvl();
  if(coins >= p){
    coins -= p;
    level++;
  }else alert("Мало монет");
  save();
}

function damage(){
  let p = priceDmg();
  if(coins >= p){
    coins -= p;
    dmg += 2;
  }else alert("Мало монет");
  save();
}

function heal(){
  let p = priceHp();
  if(coins >= p){
    coins -= p;
    hp += 20;
  }else alert("Мало монет");
  save();
}

function save(){
  localStorage.setItem("coins", coins);
  localStorage.setItem("level", level);
  localStorage.setItem("dmg", dmg);
  localStorage.setItem("hp", hp);
  update();
}

function back(){
  window.location.href = "index.html";
}

update();
</script>

</body>
</html>
