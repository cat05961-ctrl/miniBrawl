<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#1e2142,#2c2f5c);
  color:white;
  text-align:center;
}

h1{margin-top:20px}

button{
  border:none;
  padding:15px;
  margin:10px;
  border-radius:12px;
  font-size:18px;
}

#upgradeBtn{background:#4ecdc4}
#backBtn{background:#ff6b6b}
</style>
</head>

<body>

<h1>🛒 Магазин</h1>

<p id="info"></p>

<button id="upgradeBtn" onclick="upgrade()">⬆️ Улучшить уровень</button>
<br>
<button id="backBtn" onclick="back()">⬅ Назад</button>

<script>
let coins = localStorage.getItem("coins") ? parseInt(localStorage.getItem("coins")) : 0;
let level = localStorage.getItem("level") ? parseInt(localStorage.getItem("level")) : 1;

function getPrice(){
  return 10 * level; // цена растет 🔥
}

function update(){
  document.getElementById("info").innerText =
    "💰 " + coins + " | lvl " + level + " | цена: " + getPrice();
}

function upgrade(){
  let price = getPrice();

  if(coins >= price){
    coins -= price;
    level += 1;
  }else{
    alert("Не хватает монет");
  }

  localStorage.setItem("coins", coins);
  localStorage.setItem("level", level);

  update();
}

function back(){
  window.location.href = "index.html";
}

update();
</script>

</body>
</html>
