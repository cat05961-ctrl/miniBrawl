<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Gemini Chat</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: 40px auto;
    }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      height: 400px;
      overflow-y: auto;
      margin-bottom: 10px;
    }
    .user { color: green; }
    .bot { color: blue; }
  </style>
</head>
<body>

<h2>Чат с AI</h2>

<div id="chat"></div>

<input id="input" placeholder="Введите сообщение..." style="width: 80%;">
<button onclick="send()">Отправить</button>

<script>
const API_KEY = "AIzaSyA_mHCNZAaqvK1Zd38mP5p5Octkt5g2ans";

async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const userText = input.value;
  if (!userText) return;

  chat.innerHTML += `<div class="user">Ты: ${userText}</div>`;
  input.value = "";

  const response = await fetch(
    "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + API_KEY,
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        contents: [
          {
            parts: [{ text: userText }]
          }
        ]
      })
    }
  );

  const data = await response.json();

  const botText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Ошибка";

  chat.innerHTML += `<div class="bot">AI: ${botText}</div>`;
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
