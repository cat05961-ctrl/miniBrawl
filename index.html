<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Brawl</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#2c2f5c,#1e2142);
  color:white;
  text-align:center;
}

h1{margin-top:20px}

.enemy{
  width:80px;
  height:80px;
  background:red;
  border-radius:50%;
  margin:40px auto;
}

button{
  border:none;
  padding:15px;
  margin:10px;
  border-radius:12px;
  font-size:18px;
}

#clickBtn{background:#ff6b6b}
#attackBtn{background:#f7b731}
#shopBtn{background:#4ecdc4}
</style>
</head>

<body>

<h1>🎮 Mini Brawl</h1>

<p id="stats">HP: 100 | 💰 0 | lvl 1</p>

<div class="enemy" onclick="hitEnemy()"></div>

<button id="clickBtn" onclick="earn()">💰 Клик</button>
<button id="attackBtn" onclick="hitEnemy()">🔫 Атака</button>
<br>
<button id="shopBtn" onclick="goShop()">🛒 Магазин</button>

<script>
let coins = localStorage.getItem("coins") ? parseInt(localStorage.getItem("coins")) : 0;
let level = localStorage.getItem("level") ? parseInt(localStorage.getItem("level")) : 1;
let hp = 100;

function update(){
  document.getElementById("stats").innerText =
    "HP: " + hp + " | 💰 " + coins + " | lvl " + level;

  localStorage.setItem("coins", coins);
  localStorage.setItem("level", level);
}

function earn(){
  coins += 1 * level;
  update();
}

function hitEnemy(){
  hp -= 5 * level;

  if(hp <= 0){
    coins += 20 * level;
    hp = 100;
    alert("Враг побежден! + монеты");
  }

  update();
}

function goShop(){
  window.location.href = "index1.html";
}

update();
</script>

</body>
</html>
