<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Brawl</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#2c2f5c,#1e2142);
  color:white;
  text-align:center;
}

.enemy{
  width:80px;
  height:80px;
  background:red;
  border-radius:50%;
  margin:40px auto;
}

button{
  border:none;
  padding:15px;
  margin:8px;
  border-radius:12px;
  font-size:16px;
}

input{
  padding:10px;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<h1>🎮 Mini Brawl</h1>

<p id="stats"></p>

<div class="enemy" onclick="hitEnemy()"></div>

<button onclick="earn()">💰 Клик</button>
<button onclick="hitEnemy()">🔫 Атака</button>
<br>
<button onclick="goShop()">🛒 Магазин</button>

<br><br>

<!-- ПРОМОКОД -->
<input id="promo" placeholder="Введи промокод">
<button onclick="usePromo()">🎁 OK</button>

<script>
let coins = +localStorage.getItem("coins") || 0;
let level = +localStorage.getItem("level") || 1;
let dmg = +localStorage.getItem("dmg") || 5;
let maxHp = +localStorage.getItem("hp") || 100;
let hp = maxHp;

function update(){
  document.getElementById("stats").innerText =
    `HP: ${hp} | 💰 ${coins} | lvl ${level} | dmg ${dmg}`;

  localStorage.setItem("coins", coins);
  localStorage.setItem("level", level);
  localStorage.setItem("dmg", dmg);
  localStorage.setItem("hp", maxHp);
}

function earn(){
  coins += 1 * level;
  update();
}

function hitEnemy(){
  hp -= dmg;

  if(hp <= 0){
    coins += 20 * level;
    hp = maxHp;
    alert("Враг убит 💀 + монеты");
  }

  update();
}

function goShop(){
  window.location.href = "index1.html";
}

// 🔥 ПРОМОКОДЫ
function usePromo(){
  let code = document.getElementById("promo").value.toLowerCase();

  if(localStorage.getItem("promo_"+code)){
    alert("Уже использован ❌");
    return;
  }

  if(code === "snip"){
    coins += 100;
  }
  else if(code === "kot"){
    dmg += 5;
  }
  else if(code === "tok"){
    level += 1;
  }
  else{
    alert("Неверный код ❌");
    return;
  }

  localStorage.setItem("promo_"+code, true);
  alert("Промокод активирован 🎉");
  update();
}

update();
</script>

</body>
</html>
