<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MiniBrawl</title>

<style>
body {
    background:#0f1e2e;
    color:white;
    text-align:center;
    font-family:Arial;
}

input, button {
    width:90%;
    padding:12px;
    margin:5px;
    border-radius:10px;
    border:none;
}

button {
    background:#3aa0c9;
    color:white;
}
</style>
</head>

<body>

<h2>MiniBrawl 🔥</h2>

<input id="nickname" placeholder="Ник">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Пароль">

<button onclick="register()">Регистрация</button>
<button onclick="login()">Вход</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDY_GF8Adf1WyTyX91dVSGXRisxvxDyEWc",
  authDomain: "minibrawl-478a3.firebaseapp.com",
  databaseURL: "https://minibrawl-478a3-default-rtdb.firebaseio.com",
  projectId: "minibrawl-478a3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// регистрация
window.register = function () {
    let nick = document.getElementById("nickname").value;
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    if (!nick) return alert("Введите ник");

    createUserWithEmailAndPassword(auth, email, pass)
    .then((cred) => {

        set(ref(db, "users/" + cred.user.uid), {
            nickname: nick,
            email: email
        });

        location.href = "chat.html";
    })
    .catch(e => alert(e.message));
};

// вход
window.login = function () {
    signInWithEmailAndPassword(auth, email.value, password.value)
    .then(() => location.href = "chat.html")
    .catch(e => alert(e.message));
};

</script>

</body>
</html>
