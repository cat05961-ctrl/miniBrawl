<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>MiniBrawl 🔥</h2>

<div class="box">
<input id="nick" placeholder="Ник">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Пароль">

<button onclick="reg()">Регистрация</button>
<button onclick="login()">Вход</button>
</div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

import { ref, set } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

window.reg = function(){
let nick = nickEl.value;
let email = emailEl.value;
let pass = passEl.value;

createUserWithEmailAndPassword(auth,email,pass)
.then(user=>{
set(ref(db,"users/"+user.user.uid),{
nickname:nick
});
location.href="chat.html";
});
};

window.login = function(){
signInWithEmailAndPassword(auth,emailEl.value,passEl.value)
.then(()=>location.href="chat.html");
};

const nickEl = document.getElementById("nick");
const emailEl = document.getElementById("email");
const passEl = document.getElementById("pass");

</script>

</body>
</html>
