<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">

<style>
.comment {
    background:#1b2c3d;
    padding:5px;
    margin:5px;
    border-radius:8px;
}
</style>

</head>

<body>

<h2>MiniBrawl 🚀</h2>

<input id="title" placeholder="Название игры">
<textarea id="desc" placeholder="Описание"></textarea>
<input type="file" id="file">

<button onclick="add()">Выложить</button>

<hr>

<div id="posts"></div>

<script type="module">

import { auth, db, storage } from "./firebase.js";

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

import {
ref, push, onChildAdded, get, remove, update, increment
} from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

import {
ref as sRef, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/9.22.2/firebase-storage.js";

let nick="", uid="";

onAuthStateChanged(auth, async user=>{
    if(!user) return location.href="index.html";

    uid = user.uid;

    let snap = await get(ref(db,"users/"+uid));
    nick = snap.val().nickname;
});

// ➕ пост
window.add = async function(){
    let file = document.getElementById("file").files[0];
    let url="";

    if(file){
        let r = sRef(storage,"games/"+file.name);
        await uploadBytes(r,file);
        url = await getDownloadURL(r);
    }

    push(ref(db,"posts"),{
        title:title.value,
        desc:desc.value,
        file:url,
        user:nick,
        uid:uid,
        likes:0,
        views:0
    });

    alert("Готово 🔥");
};

// 📥 загрузка постов
const posts = document.getElementById("posts");

onChildAdded(ref(db,"posts"), snap=>{
    let p = snap.val();
    let key = snap.key;

    // 👀 увеличиваем просмотры
    update(ref(db,"posts/"+key),{
        views: (p.views || 0) + 1
    });

    let div = document.createElement("div");
    div.className="post";

    div.innerHTML = `
    <b>${p.title}</b><br>
    <small>${p.user}</small><br><br>
    ${p.desc}<br><br>

    👀 ${p.views || 0} | ❤️ ${p.likes || 0}<br><br>

    ${p.file ? `<a href="${p.file}">📥 Скачать</a><br>`:""}

    <button onclick="like('${key}')">❤️ Лайк</button>

    ${p.uid===uid ? `<button onclick="del('${key}')">🗑 Удалить</button>`:""}

    <hr>

    <input id="c_${key}" placeholder="Комментарий">
    <button onclick="comment('${key}')">💬</button>

    <div id="comments_${key}"></div>
    `;

    posts.appendChild(div);

    // 📥 комментарии
    onChildAdded(ref(db,"comments/"+key), s=>{
        let c = s.val();

        let cd = document.createElement("div");
        cd.className="comment";
        cd.innerText = c.user+": "+c.text;

        document.getElementById("comments_"+key).appendChild(cd);
    });
});

// ❤️ лайк
window.like = function(key){
    update(ref(db,"posts/"+key),{
        likes: increment(1)
    });
};

// 💬 коммент
window.comment = function(key){
    let text = document.getElementById("c_"+key).value;

    push(ref(db,"comments/"+key),{
        user:nick,
        text:text
    });
};

// 🗑 удалить
window.del = function(key){
    remove(ref(db,"posts/"+key));
    alert("Удалено");
};

</script>

</body>
</html>
