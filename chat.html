<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Чат</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1f2e;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 15px;
    }

    #chat {
      padding: 10px;
      margin-bottom: 80px;
    }

    .msg {
      background: #2c3e50;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    .sendBox {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
    }

    input {
      flex: 1;
      padding: 15px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      width: 80px;
      background: #4da3c7;
      border: none;
      color: white;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>💬 Чат</h1>

<div id="chat"></div>

<div class="sendBox">
  <input id="msg" placeholder="Сообщение">
  <button onclick="send()">▶</button>
</div>

<script type="module" src="chat.js"></script>

</body>
</html>
