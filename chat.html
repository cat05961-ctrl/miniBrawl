<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2 style="padding:10px">💬 Чат</h2>

<div id="chat"></div>

<div style="position:fixed; bottom:0; width:100%; display:flex;">
    <input id="msg" placeholder="Сообщение">
    <button onclick="send()">➤</button>
</div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

import {
ref, push, onChildAdded, get
} from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

let nick = "";

// 🔐 проверка входа
onAuthStateChanged(auth, async user=>{
    if(!user){
        alert("Сначала войди!");
        location.href="index.html";
        return;
    }

    let snap = await get(ref(db,"users/"+user.uid));

    if(snap.exists()){
        nick = snap.val().nickname;
    } else {
        nick = "User";
    }
});

// 📤 отправка
window.send = function(){
    let text = document.getElementById("msg").value;

    if(!text) return;

    push(ref(db,"chat"),{
        user:nick,
        msg:text
    });

    document.getElementById("msg").value="";
};

// 📥 получение сообщений
onChildAdded(ref(db,"chat"), snap=>{
    let d = snap.val();

    let div = document.createElement("div");
    div.className="post";

    div.innerHTML = `
    <b>${d.user}</b><br>
    ${d.msg}
    `;

    document.getElementById("chat").appendChild(div);
});

</script>

</body>
</html>
