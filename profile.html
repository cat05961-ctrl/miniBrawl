<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
<title>Профиль</title>
</head>

<body>

<h2>👤 Профиль</h2>

<div class="box">
<p><b>Ник:</b> <span id="nick">...</span></p>
<p><b>Email:</b> <span id="email">...</span></p>

<button onclick="logout()">Выйти</button>
<button onclick="location.href='app.html'">📦 Посты</button>
<button onclick="location.href='chat.html'">💬 Чат</button>
</div>

<h3 style="padding:10px">Мои посты</h3>

<div id="myPosts"></div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

import {
ref,
onChildAdded,
get,
remove
} from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

let uid = "";

// 🔐 проверка
onAuthStateChanged(auth, async user => {
    if (!user) return location.href = "index.html";

    uid = user.uid;

    document.getElementById("email").innerText = user.email;

    let snap = await get(ref(db, "users/" + uid));
    let data = snap.val();

    document.getElementById("nick").innerText = data?.nickname || "Без имени";

    loadMyPosts();
});

// 📦 мои посты
function loadMyPosts() {

    const box = document.getElementById("myPosts");

    onChildAdded(ref(db, "posts"), snap => {
        let p = snap.val();
        let key = snap.key;

        if (p.uid !== uid) return;

        let div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
        <b>${p.title}</b><br>
        ${p.desc}<br><br>

        ${p.file ? `<a href="${p.file}">📥 Скачать</a><br>`:""}

        <button onclick="del('${key}')">🗑 Удалить</button>
        `;

        box.appendChild(div);
    });
}

// 🗑 удалить
window.del = function(key){
    remove(ref(db,"posts/"+key));
    alert("Удалено");
};

// 🚪 выход
window.logout = function(){
    signOut(auth);
    location.href = "index.html";
};

</script>

</body>
</html>
